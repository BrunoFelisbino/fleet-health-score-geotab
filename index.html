<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>

<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;"><div style="width:22px;height:22px;border-radius:50%;border:2.5px solid rgba(14,165,233,0.2);border-top-color:#0ea5e9;animation:spin 0.8s linear infinite;"></div><span style="font-size:13px;color:#64748b;">Conectando ao Geotab...</span></div></div>
<style id="app-styles">
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.4}}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f6f8fb;--surface:#ffffff;--surface2:#f8fafc;--text:#172033;--text-dim:#64748b;--text-muted:#94a3b8;--border:#e5eaf1;--border-accent:rgba(14,165,233,.35);--cyan:#0ea5e9;--cyan-glow:rgba(14,165,233,.10);--orange:#f97316;--orange-glow:rgba(249,115,22,.12);--green:#10b981;--green-glow:rgba(16,185,129,.12);--yellow:#f59e0b;--yellow-glow:rgba(245,158,11,.12);--red:#ef4444;--red-glow:rgba(239,68,68,.11);--purple:#8b5cf6;--purple-glow:rgba(139,92,246,.10);--radius:10px;--radius-lg:14px;--mono:Consolas,monospace;--sans:'Segoe UI',system-ui,sans-serif}body,#app{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:16px 20px;background-image:radial-gradient(circle,rgba(15,23,42,.055) 1px,transparent 1px);background-size:24px 24px}.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:16px 18px;border:1px solid var(--border);border-radius:var(--radius-lg);background:linear-gradient(135deg,#fff,#eef8ff);box-shadow:0 12px 28px rgba(15,23,42,.05)}.app-title{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.02em;display:flex;align-items:center;gap:10px}.app-title-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 10px 22px rgba(14,165,233,.25)}.app-sub{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.05em}.status-pill{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:var(--mono);font-size:10px;color:#0369a1;box-shadow:0 8px 20px rgba(15,23,42,.04)}.status-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulseDot 2s ease-in-out infinite}.status-dot.green{background:var(--green)}.status-dot.yellow{background:var(--yellow)}.status-dot.red{background:var(--red)}.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;box-shadow:0 8px 22px rgba(15,23,42,.04)}.toolbar-section{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.toolbar-sep{width:1px;height:22px;background:var(--border)}.btn{height:32px;border-radius:7px;font-size:11px;font-weight:700;padding:0 14px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;box-shadow:0 8px 18px rgba(14,165,233,.22)}.btn-primary:hover{opacity:.92;transform:translateY(-1px)}.btn-ghost{background:#fff;color:var(--text-dim);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--border-accent)}.filter-input,.filter-select{height:32px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:11px;outline:none}.filter-input{padding:0 10px 0 32px}.filter-select{padding:0 10px}.filter-select option{background:#fff;color:var(--text)}.filter-input:focus,.filter-select:focus{border-color:var(--border-accent);box-shadow:0 0 0 3px rgba(14,165,233,.08)}.input-wrap{position:relative;display:inline-flex;align-items:center}.input-icon{position:absolute;left:9px;font-size:12px;color:var(--text-muted);pointer-events:none}.info-bar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;padding:9px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text-dim);margin-bottom:14px;box-shadow:0 8px 22px rgba(15,23,42,.04)}.info-bar strong{color:var(--text);font-family:var(--mono)}.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}.kpi{padding:16px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);text-align:center;transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease forwards;box-shadow:0 8px 22px rgba(15,23,42,.04)}.kpi:hover{transform:scale(1.02);box-shadow:0 14px 30px rgba(15,23,42,.07)}.kpi-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px;display:block}.kpi-val{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1}.alert{padding:9px 14px;border-radius:var(--radius);font-size:12px;margin-bottom:12px;background:var(--cyan-glow);border:1px solid rgba(14,165,233,.18);color:#0369a1;display:flex;align-items:center;gap:8px}.alert.warn{background:var(--yellow-glow);border-color:rgba(245,158,11,.25);color:#92400e}.alert.error{background:var(--red-glow);border-color:rgba(239,68,68,.25);color:#991b1b}.alert.success{background:var(--green-glow);border-color:rgba(16,185,129,.24);color:#047857}.alert[hidden]{display:none}.panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px;box-shadow:0 8px 22px rgba(15,23,42,.04)}.panel-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#0369a1;margin-bottom:12px;display:flex;align-items:center;gap:7px}.panel-title::before{content:'';width:3px;height:12px;background:linear-gradient(180deg,#0ea5e9,#0369a1);border-radius:2px;display:inline-block}table{width:100%;border-collapse:collapse;font-size:11px}thead tr{border-bottom:1px solid var(--border)}th{text-align:left;font-weight:800;color:#0369a1;text-transform:uppercase;letter-spacing:.06em;font-size:9px;padding:8px 10px;background:#f0f9ff}td{padding:8px 10px;border-bottom:1px solid #edf2f7;color:var(--text-dim);vertical-align:middle}tr:last-child td{border-bottom:none}tbody tr:hover td{background:#f8fbff}.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:10px;font-weight:800;font-family:var(--mono);letter-spacing:.03em}.b-ok{background:var(--green-glow);color:#047857;border:1px solid rgba(16,185,129,.2)}.b-warn{background:var(--yellow-glow);color:#92400e;border:1px solid rgba(245,158,11,.2)}.b-danger{background:var(--red-glow);color:#991b1b;border:1px solid rgba(239,68,68,.2)}.b-orange{background:var(--orange-glow);color:#9a3412;border:1px solid rgba(249,115,22,.2)}.b-info{background:var(--cyan-glow);color:#075985;border:1px solid rgba(14,165,233,.2)}#map-container{height:380px;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}.leaflet-container{background:#eaf3fb!important}.leaflet-popup-content-wrapper{border-radius:10px!important;background:#fff!important;color:#172033!important;border:1px solid var(--border)!important;box-shadow:0 8px 32px rgba(15,23,42,.16)!important}.leaflet-popup-tip{background:#fff!important}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}.detail-item label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px}.detail-item span{color:var(--text);font-family:var(--mono);font-size:12px}.problem-row{cursor:pointer}.problem-row.active td{background:#e0f2fe!important}.filter-chip{display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:999px;background:#e0f2fe;color:#075985;border:1px solid rgba(14,165,233,.25);font-weight:800}.filter-chip button{border:0;background:transparent;color:#075985;cursor:pointer;font-weight:900}@media(max-width:680px){.two-col{grid-template-columns:1fr}body,#app{padding:10px}.toolbar{flex-direction:column;align-items:stretch}.filter-select,.filter-input{width:100%}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
<script>
(function(){'use strict';const DAY=86400000;let apiRef=null,map=null,markersLayer=null,veiculos=[],veiculosFiltrados=[],groupSel='',filtroPlaca='',scoreSel='',problemFilter='';const $=id=>document.getElementById(id);const fmtV=v=>v==null||isNaN(Number(v))?'N/I':Number(v).toFixed(2);const daysSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/DAY):999;const call=(api,typeName,search)=>new Promise((ok,err)=>api.call('Get',{typeName,search:search||{}},ok,err));function scoreColor(s){return s>=80?'var(--green)':s>=60?'var(--yellow)':s>=40?'var(--orange)':'var(--red)'}function scoreBadge(s){return s>=80?'b-ok':s>=60?'b-warn':s>=40?'b-orange':'b-danger'}function scoreLabel(s){return s>=80?'Saudável':s>=60?'Atenção':s>=40?'Crítico':'Risco alto'}function has(t,arr){t=String(t||'').toLowerCase();return arr.some(x=>t.includes(x.toLowerCase()))}function diagName(r){return r&&r.diagnostic&&(r.diagnostic.name||r.diagnostic.id)||''}function problemLabel(k){return{gps:'Falha GPS',voltage:'Tensão fora do padrão',reboot:'Reboot excessivo',nodata:'Sem dados 7 dias',device:'Falha crítica device'}[k]||''}function matchProblem(v,k){if(!k)return true;if(k==='gps')return v.gps>0;if(k==='voltage')return v.vlow+v.vhigh>0;if(k==='reboot')return v.reboots>2;if(k==='nodata')return v.dias>=7;if(k==='device')return v.faults>0;return true}function renderApp(){$('app').innerHTML=`<div class="app-header"><div class="app-title"><div class="app-title-icon">🩺</div><div>Fleet Health Score<div class="app-sub">LOCALITEL • GEOTAB ADD-IN</div></div></div><div id="geotab-pill" class="status-pill"><span class="status-dot"></span><span id="geotab-label">Conectando...</span></div></div><div class="toolbar"><div class="toolbar-section"><button class="btn btn-primary" id="btn-refresh">🔄 Atualizar análise</button><button class="btn btn-ghost" id="btn-export">⬇️ Exportar CSV</button></div><div class="toolbar-sep"></div><div class="toolbar-section"><select class="filter-select" id="filtro-grupo" style="min-width:170px"><option value="">Todos os grupos</option></select><select class="filter-select" id="filtro-score"><option value="">Todos os status</option><option value="healthy">Saudáveis</option><option value="attention">Atenção</option><option value="critical">Críticos</option><option value="nodata">Sem dados 7 dias</option></select><div class="input-wrap"><span class="input-icon">🔍</span><input type="text" class="filter-input" id="filtro-placa" placeholder="Placa ou nome..." style="width:180px"/></div></div></div><div class="info-bar"><span>📅 Base ativa: <strong>30 dias</strong></span><span>🧮 Score: <strong>7 dias</strong></span><span>🚛 Veículos analisados: <strong id="veic-count">0</strong></span><span id="filtro-status" style="display:none;"></span></div><div id="alert-box" class="alert" hidden></div><div class="kpi-grid" id="kpi-grid"></div><div class="two-col"><div class="panel"><div class="panel-title">Distribuição do score</div><div id="score-distribution"></div></div><div class="panel"><div class="panel-title">Top problemas — clique para filtrar</div><div id="top-problems"></div></div></div><div class="two-col"><div class="panel"><div class="panel-title">Mapa de risco técnico</div><div id="map-container"></div></div><div class="panel"><div class="panel-title">Diagnóstico do veículo</div><div id="veic-detalhes" style="font-size:12px;color:var(--text-muted);">Selecione um veículo no mapa ou na tabela.</div></div></div><div class="panel"><div class="panel-title">Ranking técnico da frota</div><div id="analise-frota"></div></div>`;$('btn-refresh').addEventListener('click',()=>loadData(apiRef));$('btn-export').addEventListener('click',exportCSV);$('filtro-grupo').addEventListener('change',aplicarFiltros);$('filtro-score').addEventListener('change',aplicarFiltros);$('filtro-placa').addEventListener('input',aplicarFiltros)}function setAlert(msg,type){const el=$('alert-box');if(!el)return;if(!msg){el.hidden=true;return}el.hidden=false;el.className='alert '+(type||'');el.innerHTML=msg}function setGeotabStatus(label,state){const lbl=$('geotab-label');if(lbl)lbl.textContent=label;const dot=$('geotab-pill')?.querySelector('.status-dot');if(dot)dot.className='status-dot '+(state||'')}function analyzeStatus(records,v){const a={reboots:0,gps:0,vlow:0,vhigh:0,faults:0,minV:null,maxV:null,reasons:[]};records.forEach(r=>{const n=diagName(r),val=Number(r.data);if(has(n,['reboot','restart']))a.reboots++;if(has(n,['gps invalid','gps failure','no gps','gps']))a.gps++;if(has(n,['device fault','internal device','malfunction']))a.faults++;if(has(n,['external voltage','device voltage','battery voltage','voltage'])&&!isNaN(val)){a.minV=a.minV==null?val:Math.min(a.minV,val);a.maxV=a.maxV==null?val:Math.max(a.maxV,val);if(val<20){if(val<11)a.vlow++;if(val>14.8)a.vhigh++}else{if(val<22)a.vlow++;if(val>29)a.vhigh++}}});let p=0,ds=daysSince(v.lastDate);p+=ds<1?30:ds<2?24:ds<4?14:ds<7?7:0;p+=a.reboots===0?20:a.reboots<=2?15:a.reboots<=5?10:a.reboots<=10?5:0;p+=a.gps===0?15:a.gps<=3?11:a.gps<=10?7:0;const vb=a.vlow+a.vhigh;p+=vb===0?20:vb<=5?15:vb<=20?9:0;p+=a.faults===0?15:a.faults<=2?10:a.faults<=6?5:0;if(ds>=7)a.reasons.push('Sem dados válidos nos últimos 7 dias');else if(ds>=2)a.reasons.push('Comunicação ausente há '+ds+' dias');if(a.reboots>2)a.reasons.push('Reboot excessivo: '+a.reboots);if(a.gps>0)a.reasons.push('Falha GPS: '+a.gps);if(vb>0)a.reasons.push('Tensão fora do padrão: '+vb+' leituras');if(a.faults>0)a.reasons.push('Falhas críticas do device: '+a.faults);a.score=Math.max(0,Math.round(p));a.dias=ds;return a}async function loadData(api){if(!api){setGeotabStatus('Não conectado ao Geotab','red');return}apiRef=api;setAlert('Carregando base ativa de 30 dias e score dos últimos 7 dias...','');setGeotabStatus('Carregando dispositivos...','yellow');const from30=new Date(Date.now()-30*DAY),from7=new Date(Date.now()-7*DAY);try{const groups=await call(api,'Group',{}).catch(()=>[]);const sel=$('filtro-grupo');if(sel){sel.innerHTML='<option value="">Todos os grupos</option>'+groups.filter(g=>g.name&&g.name!=='GroupCompanyId'&&g.name!=='GroupNothingId').sort((a,b)=>a.name.localeCompare(b.name)).map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}const devices=await call(api,'Device',{isArchived:false});const deviceMap={};devices.forEach(d=>{if(!d.name||d.isActive===false)return;if(d.toDate&&new Date(d.toDate)<new Date())return;deviceMap[d.id]={id:d.id,nome:d.name,placa:d.licensePlate||d.name,grupos:(d.groups||[]).map(g=>g.id)}});const statusInfo=await call(api,'DeviceStatusInfo',{});const active={};statusInfo.forEach(s=>{const id=s.device&&s.device.id;if(!id||!deviceMap[id]||!s.dateTime||new Date(s.dateTime)<from30||s.latitude==null||s.longitude==null)return;if(!active[id]||new Date(s.dateTime)>new Date(active[id].dateTime))active[id]=s});let status=[];try{status=await call(api,'StatusData',{fromDate:from7.toISOString(),toDate:new Date().toISOString()})}catch(e){status=[]}const by={};status.forEach(r=>{const id=r.device&&r.device.id;if(id)(by[id]||(by[id]=[])).push(r)});veiculos=Object.keys(active).map(id=>{const s=active[id],info=deviceMap[id],base={id,nome:info.nome,placa:info.placa,grupos:info.grupos,lat:Number(s.latitude),lng:Number(s.longitude),lastDate:s.dateTime,online:!!s.isDeviceCommunicating};return Object.assign(base,analyzeStatus(by[id]||[],base))}).sort((a,b)=>a.score-b.score);veiculosFiltrados=[...veiculos];setGeotabStatus(veiculos.length+' veículos analisados','green');setAlert(status.length?'✅ Análise concluída com diagnósticos dos últimos 7 dias.':'✅ Análise concluída. Diagnósticos avançados podem depender de permissão/diagnósticos disponíveis.','success');renderAll()}catch(e){console.error(e);setGeotabStatus('Erro ao carregar','red');setAlert('❌ '+(e.message||'Erro desconhecido'),'error')}}function aplicarFiltros(){groupSel=$('filtro-grupo').value;scoreSel=$('filtro-score').value;filtroPlaca=$('filtro-placa').value.toLowerCase().trim();veiculosFiltrados=veiculos.filter(v=>{if(groupSel&&!v.grupos.includes(groupSel))return false;if(filtroPlaca&&!((v.nome+' '+v.placa).toLowerCase().includes(filtroPlaca)))return false;if(scoreSel==='healthy'&&v.score<80)return false;if(scoreSel==='attention'&&(v.score<60||v.score>=80))return false;if(scoreSel==='critical'&&v.score>=60)return false;if(scoreSel==='nodata'&&v.dias<7)return false;if(problemFilter&&!matchProblem(v,problemFilter))return false;return true});const fs=$('filtro-status');if(fs){if(groupSel||scoreSel||filtroPlaca||problemFilter){fs.style.display='inline-flex';fs.className='filter-chip';fs.innerHTML=(problemFilter?'Problema: '+problemLabel(problemFilter):'Filtro ativo')+' • '+veiculosFiltrados.length+' veículo'+(veiculosFiltrados.length!==1?'s':'')+' <button onclick="window._fhsClearProblem()">×</button>'}else{fs.style.display='none';fs.className='';fs.textContent=''}}renderAll()}window._fhsProblem=function(k){problemFilter=(problemFilter===k?'':k);aplicarFiltros()};window._fhsClearProblem=function(){problemFilter='';aplicarFiltros()};function renderAll(){const c=$('veic-count');if(c)c.textContent=veiculos.length.toLocaleString('pt-BR');renderKPIs();renderDistribution();renderProblems();renderTable();if(!map)initMap();plotVehicles();if(veiculosFiltrados[0])showDetail(veiculosFiltrados[0]);else $('veic-detalhes').innerHTML='Nenhum veículo encontrado para o filtro atual.'}function renderKPIs(){const data=veiculosFiltrados.length||problemFilter||scoreSel||groupSel||filtroPlaca?veiculosFiltrados:veiculos;const total=data.length||1,avg=Math.round(data.reduce((s,v)=>s+v.score,0)/total),healthy=data.filter(v=>v.score>=80).length,att=data.filter(v=>v.score>=60&&v.score<80).length,crit=data.filter(v=>v.score<60).length,nodata=data.filter(v=>v.dias>=7).length;const arr=[['Score médio',avg,'var(--cyan)'],['Saudáveis',healthy,'var(--green)'],['Atenção',att,'var(--yellow)'],['Críticos',crit,'var(--red)'],['Sem dados 7d',nodata,'var(--orange)']];$('kpi-grid').innerHTML=arr.map((k,i)=>`<div class="kpi" style="animation-delay:${i*.07}s"><span class="kpi-label">${k[0]}</span><strong class="kpi-val" style="color:${k[2]}">${k[1]}</strong></div>`).join('')}function simpleBars(rows,max,clickable){return `<table><tbody>${rows.map(r=>`<tr class="${clickable?'problem-row':''} ${problemFilter===r[2]?'active':''}" ${clickable?`onclick="window._fhsProblem('${r[2]}')"`:''}><td style="width:150px;color:var(--text);font-weight:700;">${r[0]}</td><td><div style="height:10px;background:rgba(14,165,233,.09);border-radius:8px;overflow:hidden;"><div style="height:10px;width:${max?Math.round(r[1]/max*100):0}%;background:var(--cyan);"></div></div></td><td style="width:45px;font-family:var(--mono);color:var(--text);">${r[1]}</td></tr>`).join('')}</tbody></table>`}function renderDistribution(){const data=veiculosFiltrados.length||problemFilter||scoreSel||groupSel||filtroPlaca?veiculosFiltrados:veiculos;const rows=[['80-100',data.filter(v=>v.score>=80).length],['60-79',data.filter(v=>v.score>=60&&v.score<80).length],['40-59',data.filter(v=>v.score>=40&&v.score<60).length],['0-39',data.filter(v=>v.score<40).length]];$('score-distribution').innerHTML=simpleBars(rows,Math.max(1,...rows.map(r=>r[1])),false)}function renderProblems(){const base=veiculos.filter(v=>{if(groupSel&&!v.grupos.includes(groupSel))return false;if(filtroPlaca&&!((v.nome+' '+v.placa).toLowerCase().includes(filtroPlaca)))return false;if(scoreSel==='healthy'&&v.score<80)return false;if(scoreSel==='attention'&&(v.score<60||v.score>=80))return false;if(scoreSel==='critical'&&v.score>=60)return false;if(scoreSel==='nodata'&&v.dias<7)return false;return true});const rows=[['Falha GPS',base.filter(v=>v.gps>0).length,'gps'],['Tensão fora',base.filter(v=>v.vlow+v.vhigh>0).length,'voltage'],['Reboot excessivo',base.filter(v=>v.reboots>2).length,'reboot'],['Sem dados 7d',base.filter(v=>v.dias>=7).length,'nodata'],['Falha device',base.filter(v=>v.faults>0).length,'device']];$('top-problems').innerHTML=simpleBars(rows,Math.max(1,...rows.map(r=>r[1])),true)}function renderTable(){if(!veiculosFiltrados.length){$('analise-frota').innerHTML='<div style="padding:28px;text-align:center;color:var(--text-muted);">Nenhum veículo encontrado.</div>';return}$('analise-frota').innerHTML=`<table><thead><tr><th>Score</th><th>Veículo</th><th>Placa</th><th>Último dado</th><th>Reboots</th><th>GPS</th><th>Tensão</th><th>Status</th></tr></thead><tbody>${veiculosFiltrados.map(v=>`<tr onclick="window._fhsSel('${v.id}')" style="cursor:pointer"><td><strong style="font-family:var(--mono);color:${scoreColor(v.score)}">${v.score}</strong></td><td><strong style="color:var(--text)">${v.nome}</strong></td><td><span style="font-family:var(--mono);font-size:10px;">${v.placa||'—'}</span></td><td>${v.dias>=7?'7d+':v.dias+'d'}</td><td>${v.reboots}</td><td>${v.gps}</td><td>${v.vlow+v.vhigh}</td><td><span class="badge ${scoreBadge(v.score)}">${scoreLabel(v.score)}</span></td></tr>`).join('')}</tbody></table>`}window._fhsSel=function(id){const v=veiculos.find(x=>x.id===id);if(v)showDetail(v)};function showDetail(v){const reasons=v.reasons.length?v.reasons:['Nenhum problema técnico relevante nos últimos 7 dias.'];$('veic-detalhes').innerHTML=`<div class="detail-grid"><div class="detail-item"><label>Veículo</label><span>${v.nome}</span></div><div class="detail-item"><label>Placa</label><span>${v.placa||'—'}</span></div><div class="detail-item"><label>Score</label><span style="color:${scoreColor(v.score)}">${v.score}/100</span></div><div class="detail-item"><label>Último dado</label><span>${v.dias>=7?'7d+':v.dias+'d'}</span></div><div class="detail-item"><label>Reboots</label><span>${v.reboots}</span></div><div class="detail-item"><label>Falha GPS</label><span>${v.gps}</span></div><div class="detail-item"><label>Tensão min/max</label><span>${v.minV==null?'N/I':fmtV(v.minV)+' / '+fmtV(v.maxV)}</span></div><div class="detail-item"><label>Online</label><span style="color:${v.online?'var(--green)':'var(--red)'}">${v.online?'Sim':'Não'}</span></div></div><div style="margin-top:12px;display:grid;gap:7px;">${reasons.map(r=>`<div style="padding:8px 10px;background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.12);border-radius:9px;color:var(--text-dim);font-size:12px;">• ${r}</div>`).join('')}</div>`;if(map&&v.lat&&v.lng)map.setView([v.lat,v.lng],12)}function initMap(){const c=$('map-container');if(!c||!window.L)return;map=L.map(c,{zoomControl:true}).setView([-15.8,-47.9],4);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OSM'}).addTo(map);markersLayer=L.layerGroup().addTo(map);setTimeout(()=>map&&map.invalidateSize(),500)}function plotVehicles(){if(!markersLayer)return;markersLayer.clearLayers();veiculosFiltrados.forEach(v=>{if(isNaN(v.lat)||isNaN(v.lng))return;const col=v.score>=80?'#10b981':v.score>=60?'#f59e0b':v.score>=40?'#f97316':'#ef4444';const m=L.circleMarker([v.lat,v.lng],{radius:8,fillColor:col,color:'rgba(255,255,255,.9)',weight:1.5,fillOpacity:.9});m.bindPopup(`<b>${v.nome}</b><br><span style="color:#64748b;font-size:11px;">${v.placa||''}</span><br>Score ${v.score}`);m.on('click',()=>showDetail(v));markersLayer.addLayer(m)});if(veiculosFiltrados.length){const aLat=veiculosFiltrados.reduce((s,v)=>s+v.lat,0)/veiculosFiltrados.length,aLng=veiculosFiltrados.reduce((s,v)=>s+v.lng,0)/veiculosFiltrados.length;map.setView([aLat,aLng],5)}setTimeout(()=>map&&map.invalidateSize(),200)}function exportCSV(){const rows=[['nome','placa','score','status','dias_sem_dados','reboots','falhas_gps','tensao_fora','tensao_min','tensao_max','falhas_device']].concat(veiculosFiltrados.map(v=>[v.nome,v.placa,v.score,scoreLabel(v.score),v.dias,v.reboots,v.gps,v.vlow+v.vhigh,fmtV(v.minV),fmtV(v.maxV),v.faults]));const csv=rows.map(r=>r.map(x=>'"'+String(x??'').replace(/"/g,'""')+'"').join(';')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fleet-health-score.csv';a.click();URL.revokeObjectURL(a.href)}function init(api){apiRef=api;try{renderApp();setGeotabStatus('Conectando...','yellow');loadData(api)}catch(e){console.error(e);$('app').innerHTML='<div style="padding:20px;color:#ef4444;font-family:sans-serif;font-size:13px;">❌ Erro ao carregar: '+e.message+'</div>'}}geotab.addin.fleetHealthScore=function(){return{initialize:function(api,state,callback){try{init(api)}catch(e){console.error(e)}if(callback)callback()},focus:function(){if(map)setTimeout(()=>map.invalidateSize(),200)},blur:function(){}}};})();
