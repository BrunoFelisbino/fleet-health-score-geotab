<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate" />
<title>Fleet Health Score</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
:root{--bg:#f6f8fb;--card:#fff;--txt:#172033;--mut:#64748b;--bd:#e5eaf1;--blue:#0ea5e9;--green:#10b981;--yellow:#f59e0b;--orange:#f97316;--red:#ef4444;--shadow:0 10px 25px rgba(15,23,42,.06);font-family:Segoe UI,Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);padding:16px;background-image:radial-gradient(circle,rgba(15,23,42,.055) 1px,transparent 1px);background-size:26px 26px}#app{max-width:1500px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;background:linear-gradient(135deg,#fff,#eef8ff);border:1px solid var(--bd);border-radius:18px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}.brand{display:flex;gap:12px;align-items:center}.logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#0369a1);color:white;display:grid;place-items:center;font-size:20px}.title{font-size:20px;font-weight:800}.sub{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mut)}.pill{font-size:11px;border:1px solid var(--bd);background:#fff;border-radius:999px;padding:7px 12px;color:#0369a1}.bar,.info,.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;box-shadow:var(--shadow)}.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px;margin-bottom:12px}.info{display:flex;gap:16px;flex-wrap:wrap;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--mut)}button,select,input{height:34px;border-radius:10px;border:1px solid var(--bd);background:#fff;color:var(--txt);padding:0 10px;font-size:12px}button{font-weight:700;cursor:pointer}.primary{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;border:0}.alert{display:none;margin-bottom:12px;border-radius:12px;padding:10px 12px;font-size:12px;border:1px solid rgba(14,165,233,.25);background:rgba(14,165,233,.1);color:#0369a1}.alert.show{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}.kpi{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:15px;box-shadow:var(--shadow)}.kpi span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;font-weight:800;margin-bottom:8px}.kpi strong{font-size:28px;font-family:Consolas,monospace}.kpi small{display:block;color:var(--mut);margin-top:5px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.maincols{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;margin-bottom:12px}.card{padding:16px}.h{font-size:12px;font-weight:800;text-transform:uppercase;color:#0369a1;letter-spacing:.08em;margin-bottom:12px}.chart{height:260px}.map{height:390px;border-radius:16px;overflow:hidden;border:1px solid var(--bd)}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;background:#f0f9ff;color:#0369a1;text-transform:uppercase;font-size:10px;letter-spacing:.06em;padding:10px}td{padding:10px;border-bottom:1px solid #edf2f7;color:var(--mut)}tr:hover td{background:#f8fbff}.tag{display:inline-block;border-radius:999px;padding:3px 9px;font-size:10px;font-weight:800}.ok{background:rgba(16,185,129,.12);color:#047857}.warn{background:rgba(245,158,11,.14);color:#92400e}.crit{background:rgba(249,115,22,.14);color:#9a3412}.risk{background:rgba(239,68,68,.12);color:#991b1b}.detail{display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:12px}.detail label{display:block;color:#94a3b8;font-size:10px;text-transform:uppercase;margin-bottom:2px}.detail b{font-family:Consolas,monospace}.reasons{margin-top:12px;display:grid;gap:8px}.reasons div{background:#f8fafc;border:1px solid var(--bd);border-radius:10px;padding:8px;color:var(--mut);font-size:12px}@media(max-width:800px){.cols,.maincols{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body><div id="app"><div class="top"><div class="brand"><div class="logo">🩺</div><div><div class="title">Fleet Health Score</div><div class="sub">LocaliTel • Geotab Add-In</div></div></div><div class="pill" id="status">Conectando...</div></div><div class="bar"><button class="primary" id="refresh">🔄 Atualizar análise</button><button id="export">⬇️ Exportar CSV</button><select id="group"><option value="">Todos os grupos</option></select><select id="score"><option value="">Todos os status</option><option value="healthy">Saudáveis</option><option value="attention">Atenção</option><option value="critical">Críticos</option><option value="nodata">Sem dados 7 dias</option></select><input id="q" placeholder="Placa ou nome..." /></div><div class="info"><span>📅 Base ativa: <b>30 dias</b></span><span>🧮 Score: <b>7 dias</b></span><span>🚛 Veículos analisados: <b id="count">0</b></span><span id="filterInfo"></span></div><div id="alert" class="alert"></div><div id="kpis" class="grid"></div><div class="cols"><div class="card"><div class="h">Distribuição do score</div><div id="chartScore" class="chart"></div></div><div class="card"><div class="h">Top problemas</div><div id="chartProblems" class="chart"></div></div></div><div class="maincols"><div class="card"><div class="h">Mapa de risco técnico</div><div id="map" class="map"></div></div><div class="card"><div class="h">Diagnóstico do veículo</div><div id="detail" style="color:#64748b;font-size:13px">Selecione um veículo no mapa ou na tabela.</div></div></div><div class="card"><div class="h">Ranking técnico da frota</div><div id="table"></div></div></div>
<script>
(function(){var DAY=86400000,vehicles=[],filtered=[],apiRef=null,map=null,layer=null,charts=[];function $(id){return document.getElementById(id)}function msg(t){$('status').textContent=t}function alert(t){var e=$('alert');e.innerHTML=t||'';e.className=t?'alert show':'alert'}function apiGet(api,type,search){return new Promise(function(ok,err){api.call('Get',{typeName:type,search:search||{}},ok,err)})}function days(d){return d?Math.floor((Date.now()-new Date(d).getTime())/DAY):999}function color(s){return s>=80?'#10b981':s>=60?'#f59e0b':s>=40?'#f97316':'#ef4444'}function label(s){return s>=80?'Saudável':s>=60?'Atenção':s>=40?'Crítico':'Risco alto'}function cls(s){return s>=80?'ok':s>=60?'warn':s>=40?'crit':'risk'}function has(t,a){t=String(t||'').toLowerCase();return a.some(function(x){return t.indexOf(x.toLowerCase())>-1})}function dname(r){return r&&r.diagnostic&&(r.diagnostic.name||r.diagnostic.id)||''}
function analyze(records,v){var a={reboots:0,gps:0,vlow:0,vhigh:0,faults:0,minV:null,maxV:null,reasons:[]};records.forEach(function(r){var n=dname(r),val=Number(r.data);if(has(n,['reboot','restart']))a.reboots++;if(has(n,['gps invalid','gps failure','no gps','gps']))a.gps++;if(has(n,['device fault','internal device','malfunction']))a.faults++;if(has(n,['external voltage','device voltage','battery voltage','voltage'])&&!isNaN(val)){a.minV=a.minV==null?val:Math.min(a.minV,val);a.maxV=a.maxV==null?val:Math.max(a.maxV,val);if(val<20){if(val<11)a.vlow++;if(val>14.8)a.vhigh++}else{if(val<22)a.vlow++;if(val>29)a.vhigh++}}});var p=0,ds=days(v.lastDate);p+=ds<1?30:ds<2?24:ds<4?14:ds<7?7:0;p+=a.reboots===0?20:a.reboots<=2?15:a.reboots<=5?10:a.reboots<=10?5:0;p+=a.gps===0?15:a.gps<=3?11:a.gps<=10?7:0;var vb=a.vlow+a.vhigh;p+=vb===0?20:vb<=5?15:vb<=20?9:0;p+=a.faults===0?15:a.faults<=2?10:a.faults<=6?5:0;if(ds>=7)a.reasons.push('Sem dados válidos nos últimos 7 dias');else if(ds>=2)a.reasons.push('Comunicação ausente há '+ds+' dias');if(a.reboots>2)a.reasons.push('Reboot excessivo: '+a.reboots);if(a.gps>0)a.reasons.push('Falha GPS: '+a.gps);if(vb>0)a.reasons.push('Tensão fora do padrão: '+vb+' leituras');if(a.faults>0)a.reasons.push('Falhas críticas do device: '+a.faults);a.score=Math.max(0,Math.round(p));a.dias=ds;return a}
async function load(api){if(!api){msg('Não conectado ao Geotab');alert('Abra este add-in dentro do MyGeotab para carregar dados reais.');return}apiRef=api;msg('Carregando...');alert('Carregando base ativa de 30 dias e score dos últimos 7 dias...');var from30=new Date(Date.now()-30*DAY),from7=new Date(Date.now()-7*DAY);try{var groups=await apiGet(api,'Group',{}).catch(function(){return[]});var sel=$('group');sel.innerHTML='<option value="">Todos os grupos</option>'+groups.filter(function(g){return g.name&&g.name!=='GroupCompanyId'&&g.name!=='GroupNothingId'}).sort(function(a,b){return a.name.localeCompare(b.name)}).map(function(g){return '<option value="'+g.id+'">'+g.name+'</option>'}).join('');var devs=await apiGet(api,'Device',{isArchived:false});var dm={};devs.forEach(function(d){if(!d.name||d.isActive===false)return;if(d.toDate&&new Date(d.toDate)<new Date())return;dm[d.id]={id:d.id,nome:d.name,placa:d.licensePlate||d.name,grupos:(d.groups||[]).map(function(g){return g.id})}});var dsi=await apiGet(api,'DeviceStatusInfo',{});var active={};dsi.forEach(function(s){var id=s.device&&s.device.id;if(!id||!dm[id]||!s.dateTime||new Date(s.dateTime)<from30||s.latitude==null||s.longitude==null)return;if(!active[id]||new Date(s.dateTime)>new Date(active[id].dateTime))active[id]=s});var status=[];try{status=await apiGet(api,'StatusData',{fromDate:from7.toISOString(),toDate:new Date().toISOString()})}catch(e){status=[]}var by={};status.forEach(function(r){var id=r.device&&r.device.id;if(id)(by[id]||(by[id]=[])).push(r)});vehicles=Object.keys(active).map(function(id){var s=active[id],info=dm[id],base={id:id,nome:info.nome,placa:info.placa,grupos:info.grupos,lat:Number(s.latitude),lng:Number(s.longitude),lastDate:s.dateTime,online:!!s.isDeviceCommunicating};return Object.assign(base,analyze(by[id]||[],base))}).sort(function(a,b){return a.score-b.score});filtered=vehicles.slice();msg(vehicles.length+' veículos analisados');alert(status.length?'✅ Análise concluída com diagnósticos dos últimos 7 dias.':'✅ Análise concluída. Diagnósticos avançados podem depender de permissão/diagnósticos disponíveis.');render()}catch(e){console.error(e);msg('Erro ao carregar');alert('❌ '+(e.message||'Erro desconhecido'))}}
function apply(){var g=$('group').value,q=$('q').value.toLowerCase().trim(),s=$('score').value;filtered=vehicles.filter(function(v){if(g&&v.grupos.indexOf(g)<0)return false;if(q&&(v.nome+' '+v.placa).toLowerCase().indexOf(q)<0)return false;if(s==='healthy'&&v.score<80)return false;if(s==='attention'&&(v.score<60||v.score>=80))return false;if(s==='critical'&&v.score>=60)return false;if(s==='nodata'&&v.dias<7)return false;return true});$('filterInfo').textContent=g||q||s?'Filtro ativo: '+filtered.length+' veículos':'';render()}
function render(){$('count').textContent=vehicles.length.toLocaleString('pt-BR');kpis();chartsRender();table();if(!map)initMap();plot();if(filtered[0])detail(filtered[0])}function kpis(){var total=vehicles.length||1,avg=Math.round(vehicles.reduce(function(s,v){return s+v.score},0)/total),h=vehicles.filter(function(v){return v.score>=80}).length,a=vehicles.filter(function(v){return v.score>=60&&v.score<80}).length,c=vehicles.filter(function(v){return v.score<60}).length,n=vehicles.filter(function(v){return v.dias>=7}).length;var items=[['Score médio',avg,'/100','#0369a1'],['Saudáveis',h,'score 80+','#10b981'],['Atenção',a,'score 60–79','#f59e0b'],['Críticos',c,'abaixo de 60','#ef4444'],['Sem dados 7 dias',n,'invisíveis','#f97316']];$('kpis').innerHTML=items.map(function(i){return '<div class="kpi"><span>'+i[0]+'</span><strong style="color:'+i[3]+'">'+i[1]+'</strong><small>'+i[2]+'</small></div>'}).join('')}
function chartsRender(){charts.forEach(function(c){c.dispose&&c.dispose()});charts=[];if(!window.echarts)return;var b=[['80–100',vehicles.filter(function(v){return v.score>=80}).length],['60–79',vehicles.filter(function(v){return v.score>=60&&v.score<80}).length],['40–59',vehicles.filter(function(v){return v.score>=40&&v.score<60}).length],['0–39',vehicles.filter(function(v){return v.score<40}).length]];var c1=echarts.init($('chartScore'));c1.setOption({grid:{left:35,right:10,top:20,bottom:25},tooltip:{},xAxis:{type:'category',data:b.map(function(x){return x[0]})},yAxis:{type:'value'},series:[{type:'bar',data:b.map(function(x){return x[1]}),barWidth:34,itemStyle:{borderRadius:[8,8,0,0]}}]});charts.push(c1);var p=[['Tensão',vehicles.filter(function(v){return v.vlow+v.vhigh>0}).length],['Reboot',vehicles.filter(function(v){return v.reboots>2}).length],['GPS',vehicles.filter(function(v){return v.gps>0}).length],['Sem dados',vehicles.filter(function(v){return v.dias>=7}).length],['Device',vehicles.filter(function(v){return v.faults>0}).length]];var c2=echarts.init($('chartProblems'));c2.setOption({grid:{left:85,right:10,top:20,bottom:25},tooltip:{},xAxis:{type:'value'},yAxis:{type:'category',data:p.map(function(x){return x[0]})},series:[{type:'bar',data:p.map(function(x){return x[1]}),barWidth:18,itemStyle:{borderRadius:[0,8,8,0]}}]});charts.push(c2)}
function table(){if(!filtered.length){$('table').innerHTML='<p style="color:#64748b">Nenhum veículo encontrado.</p>';return}$('table').innerHTML='<table><thead><tr><th>Score</th><th>Veículo</th><th>Placa</th><th>Último dado</th><th>Reboots</th><th>GPS</th><th>Tensão</th><th>Status</th></tr></thead><tbody>'+filtered.map(function(v){return '<tr onclick="window.fhsSel(\''+v.id+'\')" style="cursor:pointer"><td><b style="color:'+color(v.score)+'">'+v.score+'</b></td><td>'+v.nome+'</td><td>'+v.placa+'</td><td>'+(v.dias>=7?'7d+':v.dias+'d')+'</td><td>'+v.reboots+'</td><td>'+v.gps+'</td><td>'+(v.vlow+v.vhigh)+'</td><td><span class="tag '+cls(v.score)+'">'+label(v.score)+'</span></td></tr>'}).join('')+'</tbody></table>'}window.fhsSel=function(id){var v=vehicles.find(function(x){return x.id===id});if(v)detail(v)};function detail(v){$('detail').innerHTML='<div class="detail"><div><label>Veículo</label><b>'+v.nome+'</b></div><div><label>Placa</label><b>'+v.placa+'</b></div><div><label>Score</label><b style="color:'+color(v.score)+'">'+v.score+'/100</b></div><div><label>Último dado</label><b>'+(v.dias>=7?'7d+':v.dias+'d')+'</b></div><div><label>Reboots</label><b>'+v.reboots+'</b></div><div><label>Falha GPS</label><b>'+v.gps+'</b></div><div><label>Tensão min/max</label><b>'+(v.minV==null?'N/I':v.minV+' / '+v.maxV)+'</b></div><div><label>Online</label><b>'+(v.online?'Sim':'Não')+'</b></div></div><div class="reasons">'+(v.reasons.length?v.reasons:['Nenhum problema técnico relevante nos últimos 7 dias.']).map(function(r){return '<div>• '+r+'</div>'}).join('')+'</div>';if(map&&v.lat&&v.lng)map.setView([v.lat,v.lng],12)}
function initMap(){if(!window.L)return;map=L.map('map').setView([-15.8,-47.9],4);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OSM'}).addTo(map);layer=L.layerGroup().addTo(map);setTimeout(function(){map.invalidateSize()},300)}function plot(){if(!layer)return;layer.clearLayers();filtered.forEach(function(v){var m=L.circleMarker([v.lat,v.lng],{radius:8,fillColor:color(v.score),color:'#fff',weight:1.5,fillOpacity:.9});m.bindPopup('<b>'+v.nome+'</b><br>'+v.placa+'<br>Score '+v.score);m.on('click',function(){detail(v)});layer.addLayer(m)});if(filtered.length){var la=filtered.reduce(function(s,v){return s+v.lat},0)/filtered.length,ln=filtered.reduce(function(s,v){return s+v.lng},0)/filtered.length;map.setView([la,ln],5)}}function exportCSV(){var rows=[['nome','placa','score','status','dias_sem_dados','reboots','falhas_gps','tensao_fora','falhas_device']].concat(filtered.map(function(v){return[v.nome,v.placa,v.score,label(v.score),v.dias,v.reboots,v.gps,v.vlow+v.vhigh,v.faults]}));var csv=rows.map(function(r){return r.map(function(x){return '"'+String(x==null?'':x).replace(/"/g,'""')+'"'}).join(';')}).join('\n');var b=new Blob([csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fleet-health-score.csv';a.click();URL.revokeObjectURL(a.href)}
$('refresh').onclick=function(){load(apiRef)};$('export').onclick=exportCSV;$('group').onchange=apply;$('score').onchange=apply;$('q').oninput=apply;function factory(){return{initialize:function(api,state,cb){load(api);if(cb)cb()},focus:function(){if(map)setTimeout(function(){map.invalidateSize()},200);charts.forEach(function(c){c.resize&&c.resize()})},blur:function(){}}}if(!window.geotab)window.geotab={addin:{}};if(!window.geotab.addin)window.geotab.addin={};window.geotab.addin.fleetHealthScore=factory;window.geotab.addin.fleethealthscore=factory;window.geotab.addin.fleet_health_score=factory;})();
</script>
</body></html>
