<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Fleet Health Score — Geotab Add-In</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>html,body{margin:0;padding:0;background:#f5f8fc;color:#172033;font-family:'Segoe UI',system-ui,sans-serif}</style>
</head>
<body>
<div id="app"><div style="padding:40px;color:#64748b;font-size:13px">Carregando Fleet Health Score...</div></div>
<style>
*{box-sizing:border-box}:root{--bg:#f5f8fc;--card:#fff;--card2:#f8fbff;--txt:#172033;--mut:#64748b;--mut2:#94a3b8;--bd:#e5eaf1;--blue:#0ea5e9;--blue2:#0369a1;--green:#10b981;--yellow:#f59e0b;--orange:#f97316;--red:#ef4444;--gray:#64748b;--shadow:0 12px 28px rgba(15,23,42,.06);--mono:Consolas,monospace}body,#app{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--txt);padding:16px 20px;background-image:radial-gradient(circle,rgba(15,23,42,.045) 1px,transparent 1px);background-size:24px 24px}.head,.bar,.info,.panel,.kpi{background:var(--card);border:1px solid var(--bd);border-radius:16px;box-shadow:var(--shadow)}.head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;margin-bottom:12px}.title{display:flex;gap:10px;align-items:center;font-weight:800;font-size:18px}.ico{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;display:grid;place-items:center}.sub{font-family:var(--mono);font-size:10px;color:var(--mut);font-weight:400}.pill{font-family:var(--mono);font-size:10px;color:var(--blue2);background:#fff;border:1px solid var(--bd);border-radius:99px;padding:5px 12px}.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px;margin-bottom:12px}.info{display:flex;gap:16px;flex-wrap:wrap;padding:9px 14px;margin-bottom:12px;color:var(--mut);font-size:12px}button,select,input{height:32px;border-radius:8px;border:1px solid var(--bd);background:#fff;color:var(--txt);font-size:11px;padding:0 10px}button{font-weight:700;cursor:pointer}.primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:0}.alert{padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:12px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.22);color:var(--blue2)}.alert.ok{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.22);color:#047857}.alert.err{background:rgba(239,68,68,.11);border-color:rgba(239,68,68,.22);color:#991b1b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:12px}.kpi{padding:16px 14px;min-height:116px;position:relative;overflow:hidden}.kpi span{display:block;color:var(--mut2);font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}.kpi b{font-family:var(--mono);font-size:30px;line-height:1}.kpi small{display:block;color:var(--mut);font-size:12px;margin-top:4px}.mini{height:28px;margin-top:8px;display:flex;align-items:end;gap:4px}.mini i{display:block;flex:1;min-width:3px;border-radius:4px 4px 0 0;background:var(--blue);opacity:.85}.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.cols3{display:grid;grid-template-columns:1fr 1fr .75fr;gap:12px;margin-bottom:12px}.panel{padding:16px 18px;margin-bottom:12px}.pt{font-size:12px;font-weight:800;color:var(--blue2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}.pt:before{content:'';display:inline-block;width:3px;height:12px;background:linear-gradient(var(--blue),var(--blue2));border-radius:2px;margin-right:7px;vertical-align:-2px}table{width:100%;border-collapse:collapse;font-size:11px}th{text-align:left;background:#f0f9ff;color:var(--blue2);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px}td{padding:8px 10px;border-bottom:1px solid #edf2f7;color:var(--mut);vertical-align:middle}tr:hover td{background:#f8fbff}.badge{display:inline-block;border-radius:99px;padding:2px 9px;font-size:10px;font-weight:800;font-family:var(--mono)}.okb{background:rgba(16,185,129,.12);color:#047857}.warnb{background:rgba(245,158,11,.13);color:#92400e}.orangeb{background:rgba(249,115,22,.12);color:#9a3412}.riskb{background:rgba(239,68,68,.11);color:#991b1b}.map{height:380px;border:1px solid var(--bd);border-radius:16px;overflow:hidden}.detail{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px}.detail label{display:block;color:var(--mut2);font-size:10px;text-transform:uppercase;margin-bottom:2px}.detail span{font-family:var(--mono);color:var(--txt)}.reason{margin-top:12px;display:grid;gap:7px}.reason div{padding:8px 10px;background:var(--card2);border:1px solid var(--bd);border-radius:9px;color:var(--mut);font-size:12px}.reason div.hot{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.22);color:#991b1b}.problem{cursor:pointer}.problem.active td{background:#e0f2fe!important}.filterpill{display:inline-flex;align-items:center;gap:6px;background:#e0f2fe;border:1px solid #bae6fd;color:var(--blue2);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700}.clear{color:var(--red);cursor:pointer;font-weight:800;margin-left:8px}.barrow{display:grid;grid-template-columns:130px 1fr 70px;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid #edf2f7}.barrow:last-child{border-bottom:0}.track{height:11px;background:#eaf4fb;border-radius:20px;overflow:hidden}.fill{height:11px;border-radius:20px;background:var(--blue)}.donutwrap{display:flex;align-items:center;gap:20px;min-height:170px}.donut{width:132px;height:132px;border-radius:50%;display:grid;place-items:center;position:relative}.donut:after{content:'';width:82px;height:82px;background:#fff;border-radius:50%;position:absolute}.donut div{position:relative;z-index:1;text-align:center}.donut b{font-size:28px;font-family:var(--mono)}.legend{display:grid;gap:9px;font-size:12px;color:var(--mut)}.legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:7px;vertical-align:-2px}.diaglist{display:grid;gap:8px;font-size:12px}.diaglist div{display:flex;justify-content:space-between;border-bottom:1px solid #edf2f7;padding-bottom:6px;color:var(--mut)}.diaglist b{color:var(--txt);font-family:var(--mono)}@media(max-width:900px){.cols,.cols3{grid-template-columns:1fr}.donutwrap{flex-direction:column;align-items:flex-start}}@media(max-width:700px){body,#app{padding:10px}.bar{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}}
</style>
<script>
(function(){'use strict';
const DAY=86400000;let apiRef=null,map=null,layer=null,vehicles=[],filtered=[],problemFilter='';
const $=id=>document.getElementById(id);
const fmt=v=>v==null||isNaN(Number(v))?'N/I':Number(v).toFixed(2);
const pct=(a,b)=>b?Math.round((a/b)*100):0;
const days=d=>d?Math.floor((Date.now()-new Date(d).getTime())/DAY):999;
const call=(api,t,s)=>new Promise((ok,err)=>api.call('Get',{typeName:t,search:s||{}},ok,err));
function scColor(s){return s>=80?'var(--green)':s>=60?'var(--yellow)':s>=40?'var(--orange)':'var(--red)'}
function scLabel(s){return s>=80?'Saudável':s>=60?'Atenção':s>=40?'Crítico':'Risco alto'}
function scClass(s){return s>=80?'okb':s>=60?'warnb':s>=40?'orangeb':'riskb'}
function has(t,a){t=String(t||'').toLowerCase();return a.some(x=>t.includes(x.toLowerCase()))}
function dname(r){return String(r&&r.diagnostic&&(r.diagnostic.id||r.diagnostic.name)||'')}
function isUnpluggedDiagnostic(r){const n=dname(r).toLowerCase();return n.includes('diagnosticdevicehasbeenunpluggedid')||n.includes('devicehasbeenunplugged')||n.includes('unplugged')||n.includes('desconectado')}
function pName(k){return{unplugged:'Possível remoção não autorizada',voltage:'Tensão fora do padrão',vlow:'Tensão baixa',vhigh:'Tensão alta',reboot:'Reboot excessivo',gps:'Falha GPS',nodata:'Sem dados 7 dias',device:'Falha crítica device'}[k]||''}
function match(v,k){if(!k)return true;if(k==='unplugged')return v.unplugged>0;if(k==='voltage')return(v.vlow+v.vhigh)>0;if(k==='vlow')return v.vlow>0;if(k==='vhigh')return v.vhigh>0;if(k==='reboot')return v.reboots>2;if(k==='gps')return v.gps>0;if(k==='nodata')return v.dias>=7;if(k==='device')return v.faults>0;return true}
function mainProblem(v){if(v.unplugged>0)return 'Possível remoção não autorizada';if(v.dias>=7)return 'Sem dados '+v.dias+' dias';if(v.vlow>0)return 'Tensão baixa';if(v.vhigh>0)return 'Tensão alta';if(v.reboots>2)return 'Reboot excessivo';if(v.gps>0)return 'Falha GPS';if(v.faults>0)return 'Falha device';return 'Sem alerta crítico'}
function shell(){
  $('app').innerHTML=`<div class="head"><div class="title"><div class="ico">LT</div><div>Fleet Health Score<div class="sub">LOCALITEL • GEOTAB ADD-IN</div></div></div><div class="pill" id="statusBox">Conectando...</div></div><div class="bar"><button class="primary" id="refreshBtn">Atualizar análise</button><button id="exportBtn">Exportar CSV</button><button id="clearBtn">Limpar filtros</button><select id="groupFilter"><option value="">Todos os grupos</option></select><select id="scoreFilter"><option value="">Todos os status</option><option value="healthy">Saudáveis</option><option value="attention">Atenção</option><option value="critical">Críticos</option><option value="nodata">Sem dados 7 dias</option></select><input id="queryFilter" placeholder="Placa ou nome..."/></div><div class="info"><span>Base ativa: <b>30 dias</b></span><span>Score: <b>7 dias</b></span><span>Veículos analisados: <b id="countBox">0</b></span><span id="filterInfo"></span></div><div id="alertBox" class="alert" style="display:none"></div><div id="kpisBox" class="grid"></div><div class="cols3"><div class="panel"><div class="pt">Distribuição do score</div><div id="distBox"></div></div><div class="panel"><div class="pt">Top problemas — clique para filtrar</div><div id="problemsBox"></div></div><div class="panel"><div class="pt">Qualidade elétrica</div><div id="electricBox"></div></div></div><div class="cols"><div class="panel"><div class="pt">Mapa de risco técnico</div><div id="mapBox" class="map"></div></div><div class="panel"><div class="pt">Diagnóstico do veículo selecionado</div><div id="detailBox" style="color:var(--mut);font-size:12px">Selecione um veículo.</div></div></div><div class="panel"><div class="pt">Ranking técnico da frota</div><div id="tableBox"></div></div>`;
  $('refreshBtn').onclick=()=>load(apiRef);$('exportBtn').onclick=exportCSV;$('clearBtn').onclick=clearFilters;$('groupFilter').onchange=apply;$('scoreFilter').onchange=apply;$('queryFilter').oninput=apply;
}
function setStatus(t){const e=$('statusBox');if(e)e.textContent=t}
function alertMsg(t,ok,err){const e=$('alertBox');if(!e)return;e.style.display=t?'block':'none';e.className='alert '+(ok?'ok':err?'err':'');e.innerHTML=t||''}
function analyze(records,v){const a={reboots:0,gps:0,vlow:0,vhigh:0,faults:0,unplugged:0,minV:null,maxV:null,badVoltages:[],voltageTotal:0,reasons:[]};records.forEach(r=>{const n=dname(r),val=Number(r.data);if(isUnpluggedDiagnostic(r))a.unplugged++;if(has(n,['reboot','restart']))a.reboots++;if(has(n,['gps invalid','gps failure','no gps','gps']))a.gps++;if(has(n,['device fault','internal device','malfunction']))a.faults++;if(has(n,['external voltage','device voltage','battery voltage','voltage'])&&!isNaN(val)){a.voltageTotal++;a.minV=a.minV==null?val:Math.min(a.minV,val);a.maxV=a.maxV==null?val:Math.max(a.maxV,val);let bad=false;if(val<20){if(val<11){a.vlow++;bad=true}if(val>14.8){a.vhigh++;bad=true}}else{if(val<22){a.vlow++;bad=true}if(val>29){a.vhigh++;bad=true}}if(bad&&a.badVoltages.length<12)a.badVoltages.push(val)}});let p=0,ds=days(v.lastDate);p+=ds<1?30:ds<2?22:ds<4?12:ds<7?5:0;p+=a.reboots===0?20:a.reboots<=2?15:a.reboots<=5?10:a.reboots<=10?5:0;p+=a.gps===0?15:a.gps<=3?11:a.gps<=10?7:0;const vb=a.vlow+a.vhigh;p+=vb===0?20:vb<=5?15:vb<=20?9:0;p+=a.faults===0?15:a.faults<=2?10:a.faults<=6?5:0;if(a.unplugged>0){a.reasons.unshift('Possível remoção não autorizada: diagnóstico DiagnosticDeviceHasBeenUnpluggedId encontrado');p=Math.min(p,25)}if(ds>=7){a.reasons.push('Sem dados válidos nos últimos 7 dias');p=Math.min(p,45)}else if(ds>=4){a.reasons.push('Comunicação muito atrasada: '+ds+' dias');p=Math.min(p,55)}else if(ds>=2){a.reasons.push('Comunicação ausente há '+ds+' dias')}if(a.reboots>2)a.reasons.push('Reboot excessivo: '+a.reboots);if(a.gps>0)a.reasons.push('Falha GPS: '+a.gps);if(vb>0)a.reasons.push('Tensão fora do padrão: '+vb+' leituras — '+a.badVoltages.map(fmt).join(', ')+' V');if(a.faults>0)a.reasons.push('Falhas críticas do device: '+a.faults);a.score=Math.max(0,Math.round(p));a.dias=ds;return a}
async function load(api){if(!api){setStatus('Não conectado');alertMsg('Abra este add-in dentro do MyGeotab para carregar dados reais.',false,true);return}apiRef=api;setStatus('Carregando...');alertMsg('Carregando base ativa de 30 dias, score dos últimos 7 dias e diagnósticos de desconexão...');const from30=new Date(Date.now()-30*DAY),from7=new Date(Date.now()-7*DAY);try{const groups=await call(api,'Group',{}).catch(()=>[]);$('groupFilter').innerHTML='<option value="">Todos os grupos</option>'+groups.filter(g=>g.name&&g.name!=='GroupCompanyId'&&g.name!=='GroupNothingId').sort((a,b)=>a.name.localeCompare(b.name)).map(g=>`<option value="${g.id}">${g.name}</option>`).join('');const devs=await call(api,'Device',{isArchived:false});const dm={};devs.forEach(d=>{if(!d.name||d.isActive===false)return;if(d.toDate&&new Date(d.toDate)<new Date())return;dm[d.id]={nome:d.name,placa:d.licensePlate||d.name,grupos:(d.groups||[]).map(g=>g.id)}});const dsi=await call(api,'DeviceStatusInfo',{});const active={};dsi.forEach(s=>{const id=s.device&&s.device.id;if(!id||!dm[id]||!s.dateTime||new Date(s.dateTime)<from30||s.latitude==null||s.longitude==null)return;if(!active[id]||new Date(s.dateTime)>new Date(active[id].dateTime))active[id]=s});let st=[];try{st=await call(api,'StatusData',{fromDate:from7.toISOString(),toDate:new Date().toISOString()})}catch(e){st=[]}let faults=[];try{faults=await call(api,'FaultData',{fromDate:from30.toISOString(),toDate:new Date().toISOString()})}catch(e){faults=[]}const by={};st.concat(faults).forEach(r=>{const id=r.device&&r.device.id;if(id)(by[id]||(by[id]=[])).push(r)});vehicles=Object.keys(active).map(id=>{const s=active[id],i=dm[id],base={id,nome:i.nome,placa:i.placa,grupos:i.grupos,lat:Number(s.latitude),lng:Number(s.longitude),lastDate:s.dateTime,online:!!s.isDeviceCommunicating};return Object.assign(base,analyze(by[id]||[],base))}).sort((a,b)=>a.score-b.score);filtered=[...vehicles];setStatus(vehicles.length+' veículos analisados');alertMsg('Análise concluída. Diagnóstico de desconexão: '+vehicles.filter(v=>v.unplugged>0).length+' veículo(s) com possível remoção não autorizada.',true);render()}catch(e){console.error(e);setStatus('Erro');alertMsg('Erro ao carregar: '+(e.message||'Erro desconhecido'),false,true)}}
function apply(){const g=$('groupFilter').value,s=$('scoreFilter').value,txt=$('queryFilter').value.toLowerCase().trim();filtered=vehicles.filter(v=>{if(g&&!v.grupos.includes(g))return false;if(txt&&!((v.nome+' '+v.placa).toLowerCase().includes(txt)))return false;if(s==='healthy'&&v.score<80)return false;if(s==='attention'&&(v.score<60||v.score>=80))return false;if(s==='critical'&&v.score>=60)return false;if(s==='nodata'&&v.dias<7)return false;if(problemFilter&&!match(v,problemFilter))return false;return true});const parts=[];if(g)parts.push('grupo');if(s)parts.push('status');if(txt)parts.push('busca');if(problemFilter)parts.push(pName(problemFilter));$('filterInfo').innerHTML=parts.length?`<span class="filterpill">Filtro: ${parts.join(' + ')} • ${filtered.length} veículos <span class="clear" onclick="window._clearProblem()">limpar problema</span></span>`:'';render()}
function clearFilters(){problemFilter='';$('groupFilter').value='';$('scoreFilter').value='';$('queryFilter').value='';apply()}
window._clearProblem=function(){problemFilter='';apply()};window._problem=function(k){problemFilter=problemFilter===k?'':k;apply()};
function render(){const c=$('countBox');if(c)c.textContent=vehicles.length.toLocaleString('pt-BR');renderKpis();renderDist();renderProblems();renderElectric();renderTable();if(!map)initMap();plot();if(filtered[0])showDetail(filtered[0])}
function mini(values,color){const max=Math.max(1,...values);return '<div class="mini">'+values.map(v=>`<i style="height:${Math.max(4,Math.round(v/max*26))}px;background:${color}"></i>`).join('')+'</div>'}
function renderKpis(){const total=filtered.length||1,avg=Math.round(filtered.reduce((s,v)=>s+v.score,0)/total),h=filtered.filter(v=>v.score>=80).length,a=filtered.filter(v=>v.score>=60&&v.score<80).length,c=filtered.filter(v=>v.score<60).length,n=filtered.filter(v=>v.dias>=7).length,u=filtered.filter(v=>v.unplugged>0).length;const cards=[['Fleet Health Index',avg,'de 100','var(--blue)',[avg,Math.max(0,avg-5),avg+2,Math.max(0,avg-9),avg]],['Saudáveis',h,pct(h,total)+'% da frota','var(--green)',[h,Math.max(0,h-1),h+1,h,h+2]],['Críticos',c,pct(c,total)+'% da frota','var(--red)',[c,Math.max(0,c-1),c,c+1,c]],['Sem dados 7d',n,pct(n,total)+'% da frota','var(--red)',[n,Math.max(0,n-2),n-1,n,n]],['Possível remoção',u,pct(u,total)+'% da frota','var(--red)',[u,Math.max(0,u-1),u,u+1,u]]];$('kpisBox').innerHTML=cards.map(r=>`<div class="kpi"><span>${r[0]}</span><b style="color:${r[3]}">${r[1]}</b><small>${r[2]}</small>${mini(r[4],r[3])}</div>`).join('')}
function bars(rows){const m=Math.max(1,...rows.map(r=>r[1]));return rows.map(r=>`<div class="barrow"><b style="color:var(--txt)">${r[0]}</b><div class="track"><div class="fill" style="width:${Math.round(r[1]/m*100)}%;background:${r[3]||'var(--blue)'}"></div></div><span style="font-family:var(--mono);color:var(--txt)">${r[1]}${r[2]?' ('+r[2]+')':''}</span></div>`).join('')}
function renderDist(){const total=filtered.length||1;const rows=[['80 - 100',filtered.filter(v=>v.score>=80).length,pct(filtered.filter(v=>v.score>=80).length,total)+'%','var(--blue)'],['60 - 79',filtered.filter(v=>v.score>=60&&v.score<80).length,pct(filtered.filter(v=>v.score>=60&&v.score<80).length,total)+'%','var(--blue)'],['40 - 59',filtered.filter(v=>v.score>=40&&v.score<60).length,pct(filtered.filter(v=>v.score>=40&&v.score<60).length,total)+'%','var(--orange)'],['0 - 39',filtered.filter(v=>v.score<40).length,pct(filtered.filter(v=>v.score<40).length,total)+'%','var(--red)']];$('distBox').innerHTML=bars(rows)}
function currentBaseNoProblem(){const g=$('groupFilter').value,s=$('scoreFilter').value,txt=$('queryFilter').value.toLowerCase().trim();return vehicles.filter(v=>{if(g&&!v.grupos.includes(g))return false;if(txt&&!((v.nome+' '+v.placa).toLowerCase().includes(txt)))return false;if(s==='healthy'&&v.score<80)return false;if(s==='attention'&&(v.score<60||v.score>=80))return false;if(s==='critical'&&v.score>=60)return false;if(s==='nodata'&&v.dias<7)return false;return true})}
function renderProblems(){const base=currentBaseNoProblem();const rows=[['unplugged','Possível remoção não autorizada',base.filter(v=>match(v,'unplugged')).length,'var(--red)'],['voltage','Tensão fora do padrão',base.filter(v=>match(v,'voltage')).length,'var(--red)'],['nodata','Sem dados 7 dias',base.filter(v=>match(v,'nodata')).length,'var(--red)'],['vlow','Tensão baixa',base.filter(v=>match(v,'vlow')).length,'var(--orange)'],['vhigh','Tensão alta',base.filter(v=>match(v,'vhigh')).length,'var(--orange)'],['reboot','Reboot excessivo',base.filter(v=>match(v,'reboot')).length,'var(--gray)'],['gps','Falha GPS',base.filter(v=>match(v,'gps')).length,'var(--gray)'],['device','Falha crítica device',base.filter(v=>match(v,'device')).length,'var(--red)']];const m=Math.max(1,...rows.map(r=>r[2]));$('problemsBox').innerHTML='<table><tbody>'+rows.map(r=>`<tr class="problem ${problemFilter===r[0]?'active':''}" onclick="window._problem('${r[0]}')"><td style="width:210px;color:var(--txt);font-weight:800">${r[1]}</td><td><div class="track"><div class="fill" style="width:${Math.round(r[2]/m*100)}%;background:${problemFilter===r[0]?'var(--orange)':r[3]}"></div></div></td><td style="width:42px;font-family:var(--mono);color:var(--txt)">${r[2]}</td></tr>`).join('')+'</tbody></table>'}
function renderElectric(){const total=filtered.reduce((s,v)=>s+(v.voltageTotal||0),0),bad=filtered.reduce((s,v)=>s+v.vlow+v.vhigh,0),good=Math.max(0,total-bad),quality=pct(good,total),deg=Math.round(quality*3.6);$('electricBox').innerHTML=`<div class="donutwrap"><div class="donut" style="background:conic-gradient(var(--green) 0deg,var(--green) ${deg}deg,var(--red) ${deg}deg,var(--red) 360deg)"><div><b>${quality}%</b><br><small>Qualidade</small></div></div><div class="legend"><div><i style="background:var(--green)"></i>Leituras válidas: <b>${good}</b> (${quality}%)</div><div><i style="background:var(--red)"></i>Fora do padrão: <b>${bad}</b> (${pct(bad,total)}%)</div><div>Total de leituras: <b>${total}</b></div></div></div>`}
function renderTable(){if(!filtered.length){$('tableBox').innerHTML='<div style="padding:25px;text-align:center;color:var(--mut)">Nenhum veículo encontrado.</div>';return}$('tableBox').innerHTML=`<table><thead><tr><th>#</th><th>Score</th><th>Veículo</th><th>Placa</th><th>Último dado</th><th>Problema principal</th><th>Reboots</th><th>GPS</th><th>Tensão</th><th>Status</th></tr></thead><tbody>${filtered.map((v,i)=>`<tr onclick="window._sel('${v.id}')" style="cursor:pointer"><td>${i+1}</td><td><b style="font-family:var(--mono);color:${scColor(v.score)}">${v.score}</b></td><td><b style="color:var(--txt)">${v.nome}</b></td><td><span style="font-family:var(--mono);font-size:10px">${v.placa||'—'}</span></td><td>${v.dias>=7?'7d+':v.dias+'d'}</td><td>${mainProblem(v)}</td><td>${v.reboots}</td><td>${v.gps}</td><td>${v.vlow+v.vhigh? 'Fora do padrão':'Normal'}</td><td><span class="badge ${scClass(v.score)}">${scLabel(v.score)}</span></td></tr>`).join('')}</tbody></table>`}
window._sel=function(id){const v=vehicles.find(x=>x.id===id);if(v)showDetail(v)};
function showDetail(v){const voltage=v.badVoltages&&v.badVoltages.length?`<div><label>Leituras ruins</label><span>${v.badVoltages.map(fmt).join(', ')} V</span></div>`:'';const reasons=v.reasons.length?v.reasons:['Nenhum problema técnico relevante nos últimos 7 dias.'];$('detailBox').innerHTML=`<div class="detail"><div><label>Veículo</label><span>${v.nome}</span></div><div><label>Placa</label><span>${v.placa||'—'}</span></div><div><label>Score</label><span style="color:${scColor(v.score)}">${v.score}/100</span></div><div><label>Status</label><span>${scLabel(v.score)}</span></div><div><label>Último dado</label><span>${v.dias>=7?'7d+':v.dias+'d'}</span></div><div><label>Online</label><span style="color:${v.online?'var(--green)':'var(--red)'}">${v.online?'Sim':'Não'}</span></div><div><label>Tensão min/max</label><span>${v.minV==null?'N/I':fmt(v.minV)+' / '+fmt(v.maxV)}</span></div><div><label>Desconexão/rem. possível</label><span>${v.unplugged>0?'Sim':'Não'}</span></div>${voltage}</div><div class="diaglist" style="margin-top:12px"><div><span>Tensão mínima</span><b>${fmt(v.minV)}</b></div><div><span>Tensão máxima</span><b>${fmt(v.maxV)}</b></div><div><span>Leituras fora do padrão</span><b>${v.vlow+v.vhigh}</b></div><div><span>Reboots 7 dias</span><b>${v.reboots}</b></div><div><span>Falhas GPS</span><b>${v.gps}</b></div><div><span>Falhas críticas</span><b>${v.faults}</b></div><div><span>Diagnostic unplugged</span><b>${v.unplugged}</b></div></div><div class="reason">${reasons.map(r=>`<div class="${r.includes('remoção')?'hot':''}">${r}</div>`).join('')}</div>`;if(map&&v.lat&&v.lng)map.setView([v.lat,v.lng],12)}
function initMap(){if(!window.L||!$('mapBox'))return;map=L.map('mapBox').setView([-15.8,-47.9],4);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OSM'}).addTo(map);layer=L.layerGroup().addTo(map);setTimeout(()=>map.invalidateSize(),300)}
function plot(){if(!layer)return;layer.clearLayers();filtered.forEach(v=>{if(isNaN(v.lat)||isNaN(v.lng))return;const col=v.unplugged>0?'#ef4444':v.score>=80?'#10b981':v.score>=60?'#f59e0b':v.score>=40?'#f97316':'#ef4444';const m=L.circleMarker([v.lat,v.lng],{radius:v.unplugged>0?10:8,fillColor:col,color:'#fff',weight:1.5,fillOpacity:.88});m.bindPopup(`<b>${v.nome}</b><br>${v.placa||''}<br>Score ${v.score}<br>${mainProblem(v)}`);m.on('click',()=>showDetail(v));layer.addLayer(m)});if(filtered.length){map.setView([filtered.reduce((s,v)=>s+v.lat,0)/filtered.length,filtered.reduce((s,v)=>s+v.lng,0)/filtered.length],5)}}
function exportCSV(){const rows=[['nome','placa','score','status','problema_principal','possivel_remocao_nao_autorizada','diagnostic_unplugged_count','dias_sem_dados','reboots','falhas_gps','tensao_fora','leituras_tensao_ruins','tensao_min','tensao_max','falhas_device']].concat(filtered.map(v=>[v.nome,v.placa,v.score,scLabel(v.score),mainProblem(v),v.unplugged>0?'sim':'nao',v.unplugged,v.dias,v.reboots,v.gps,v.vlow+v.vhigh,(v.badVoltages||[]).map(fmt).join('|'),fmt(v.minV),fmt(v.maxV),v.faults]));const csv=rows.map(r=>r.map(x=>'"'+String(x??'').replace(/"/g,'""')+'"').join(';')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fleet-health-score.csv';a.click();URL.revokeObjectURL(a.href)}
function init(api){apiRef=api;shell();load(api)}
if(!window.geotab)window.geotab={addin:{}};if(!window.geotab.addin)window.geotab.addin={};
window.geotab.addin.fleetHealthScore=function(){return{initialize:function(api,state,cb){try{init(api)}catch(e){console.error(e);const root=$('app');if(root)root.innerHTML='<div style="padding:20px;color:#991b1b">Erro ao iniciar Fleet Health Score: '+(e.message||e)+'</div>'}if(cb)cb()},focus:function(){if(map)setTimeout(()=>map.invalidateSize(),200)},blur:function(){}}};
})();
</script>
</body>
</html>
