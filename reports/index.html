<style>
:root{--bg:#f5f8fc;--card:#fff;--txt:#0f172a;--mut:#64748b;--bd:#e5eaf1;--blue:#0ea5e9;--blue2:#0369a1;--green:#10b981;--yellow:#f59e0b;--orange:#f97316;--red:#ef4444;--shadow:0 16px 34px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Segoe UI,system-ui,sans-serif;color:var(--txt);padding:18px;background-image:radial-gradient(circle,rgba(15,23,42,.045) 1px,transparent 1px);background-size:24px 24px}.head,.bar,.card,.panel{background:var(--card);border:1px solid var(--bd);border-radius:18px;box-shadow:var(--shadow)}.head{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:18px;margin-bottom:14px}.logo{height:44px;object-fit:contain}.title{font-weight:900;font-size:22px}.sub{font-size:11px;color:var(--mut);font-family:Consolas,monospace;margin-top:4px}.pill{border:1px solid var(--bd);border-radius:99px;padding:7px 12px;color:var(--blue2);font-size:11px;font-weight:800;background:#fff}.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px;margin-bottom:14px}button,input,select{height:34px;border:1px solid var(--bd);border-radius:10px;background:#fff;padding:0 12px;font-size:12px}button{font-weight:800;cursor:pointer}.primary{border:0;color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue2))}.danger{color:#991b1b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:14px}.card{padding:16px}.card span{display:block;color:var(--mut);font-size:10px;text-transform:uppercase;font-weight:900;letter-spacing:.08em}.card b{display:block;font-size:30px;margin-top:7px}.card small{display:block;color:var(--mut);margin-top:4px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel{padding:18px;margin-bottom:14px}.pt{font-size:13px;font-weight:900;color:var(--blue2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}.alert{padding:11px 14px;border-radius:12px;background:#e0f2fe;color:#075985;border:1px solid #bae6fd;margin-bottom:14px;font-size:13px}.alert.err{background:#fee2e2;color:#991b1b;border-color:#fecaca}.alert.ok{background:#dcfce7;color:#166534;border-color:#bbf7d0}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;background:#f0f9ff;color:var(--blue2);font-size:10px;text-transform:uppercase;padding:9px}td{border-bottom:1px solid #edf2f7;padding:9px;color:var(--mut)}.badge{border-radius:99px;padding:3px 8px;font-size:10px;font-weight:900}.okb{background:#d1fae5;color:#047857}.warnb{background:#fef3c7;color:#92400e}.orangeb{background:#ffedd5;color:#9a3412}.riskb{background:#fee2e2;color:#991b1b}.barrow{display:grid;grid-template-columns:170px 1fr 42px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #edf2f7}.track{height:12px;background:#eaf4fb;border-radius:20px;overflow:hidden}.fill{height:12px;border-radius:20px;background:var(--blue)}@media(max-width:900px){.head,.cols{grid-template-columns:1fr;display:block}.bar{align-items:stretch;flex-direction:column}button,input,select{width:100%}}
</style>
