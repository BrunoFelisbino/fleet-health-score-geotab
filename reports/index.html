<style>
*{box-sizing:border-box}:root{--bg:#f5f8fc;--card:#fff;--card2:#f8fbff;--txt:#172033;--mut:#64748b;--mut2:#94a3b8;--bd:#e5eaf1;--blue:#0ea5e9;--blue2:#0369a1;--green:#10b981;--yellow:#f59e0b;--orange:#f97316;--red:#ef4444;--gray:#64748b;--shadow:0 12px 28px rgba(15,23,42,.06);--mono:Consolas,monospace}html,body{margin:0;padding:0}body,#app{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--txt);padding:16px 20px;background-image:radial-gradient(circle,rgba(15,23,42,.045) 1px,transparent 1px);background-size:24px 24px}.head,.bar,.info,.panel,.kpi{background:var(--card);border:1px solid var(--bd);border-radius:16px;box-shadow:var(--shadow)}.head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;margin-bottom:12px}.brand{display:flex;gap:14px;align-items:center}.logo{height:46px;width:168px;object-fit:contain;object-position:left center}.title{font-weight:900;font-size:18px;line-height:1.1}.sub{font-family:var(--mono);font-size:10px;color:var(--mut);font-weight:400;margin-top:4px}.pill{font-family:var(--mono);font-size:10px;color:var(--blue2);background:#fff;border:1px solid var(--bd);border-radius:99px;padding:5px 12px}.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px;margin-bottom:12px}.info{display:flex;gap:16px;flex-wrap:wrap;padding:9px 14px;margin-bottom:12px;color:var(--mut);font-size:12px}button,select,input{height:32px;border-radius:8px;border:1px solid var(--bd);background:#fff;color:var(--txt);font-size:11px;padding:0 10px}input{min-width:190px}button{font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:0}.soft{background:#f0f9ff;color:var(--blue2)}.alert{padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:12px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.22);color:var(--blue2)}.alert.ok{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.22);color:#047857}.alert.err{background:rgba(239,68,68,.11);border-color:rgba(239,68,68,.22);color:#991b1b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:12px}.kpi{padding:16px 14px;min-height:116px;position:relative;overflow:hidden}.kpi:after{content:'';position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;background:rgba(14,165,233,.08)}.kpi span{display:block;color:var(--mut2);font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}.kpi b{font-family:var(--mono);font-size:30px;line-height:1}.kpi small{display:block;color:var(--mut);font-size:12px;margin-top:4px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.panel{padding:16px 18px;margin-bottom:12px}.pt{font-size:12px;font-weight:900;color:var(--blue2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}.pt:before{content:'';display:inline-block;width:3px;height:12px;background:linear-gradient(var(--blue),var(--blue2));border-radius:2px;margin-right:7px;vertical-align:-2px}table{width:100%;border-collapse:collapse;font-size:11px}th{text-align:left;background:#f0f9ff;color:var(--blue2);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px}td{padding:8px 10px;border-bottom:1px solid #edf2f7;color:var(--mut);vertical-align:middle}tr:hover td{background:#f8fbff}.tablewrap{overflow:auto;border:1px solid var(--bd);border-radius:12px}.tablewrap table{min-width:900px}.vehicleCell{max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);font-weight:800}.badge{display:inline-block;border-radius:99px;padding:2px 9px;font-size:10px;font-weight:900;font-family:var(--mono)}.okb{background:rgba(16,185,129,.12);color:#047857}.warnb{background:rgba(245,158,11,.13);color:#92400e}.orangeb{background:rgba(249,115,22,.12);color:#9a3412}.riskb{background:rgba(239,68,68,.11);color:#991b1b}.barrow{display:grid;grid-template-columns:165px 1fr 56px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #edf2f7;font-size:12px}.barrow:last-child{border-bottom:0}.track{height:11px;background:#eaf4fb;border-radius:20px;overflow:hidden}.fill{height:11px;border-radius:20px;background:var(--blue)}.exec{display:grid;gap:8px}.exec div{padding:10px 12px;background:var(--card2);border:1px solid var(--bd);border-radius:10px;color:var(--mut);font-size:12px}.exec b{color:var(--txt)}@media(max-width:900px){body,#app{padding:10px}.head{align-items:flex-start;gap:10px;flex-direction:column}.bar{align-items:stretch;flex-direction:column}.bar button,.bar input,.bar select{width:100%}.cols{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.logo{height:40px;width:150px}}

<script>
(function(){'use strict';
const DAY=86400000,LOGO_URL='../assets/rotagyn-logo.svg';let apiRef=null,stateRef={},vehicles=[],filtered=[],dbName='Rotagyn';
const $=id=>document.getElementById(id),pct=(a,b)=>b?Math.round(a/b*100):0,fmt=v=>v==null||isNaN(Number(v))?'N/I':Number(v).toFixed(2),safe=s=>String(s||'Rotagyn').replace(/[\\/:*?"<>|]+/g,'-').trim()||'Rotagyn';
const call=(api,t,s)=>new Promise((ok,err)=>api.call('Get',{typeName:t,search:s||{}},ok,err));
function scColor(s){return s>=80?'#10b981':s>=60?'#f59e0b':s>=40?'#f97316':'#ef4444'}
function scVar(s){return s>=80?'var(--green)':s>=60?'var(--yellow)':s>=40?'var(--orange)':'var(--red)'}
function scLabel(s){return s>=80?'Saudável':s>=60?'Atenção':s>=40?'Crítico':'Risco alto'}
function scClass(s){return s>=80?'okb':s>=60?'warnb':s>=40?'orangeb':'riskb'}
function has(t,a){t=String(t||'').toLowerCase();return a.some(x=>t.includes(x.toLowerCase()))}
function dname(r){return String(r&&r.diagnostic&&(r.diagnostic.id||r.diagnostic.name)||'')}
function isUnpluggedDiagnostic(r){const n=dname(r).toLowerCase();return n.includes('diagnosticdevicehasbeenunpluggedid')||n.includes('devicehasbeenunplugged')||n.includes('unplugged')||n.includes('desconectado')}
function mainProblem(v){if(v.unplugged>0)return'Possível remoção não autorizada';if(v.dias>=7)return'Sem dados '+v.dias+' dias';if(v.vlow>0)return'Tensão baixa';if(v.vhigh>0)return'Tensão alta';if(v.reboots>2)return'Reboot excessivo';if(v.gps>0)return'Falha GPS';if(v.faults>0)return'Falha device';return'Sem alerta crítico'}
function analyze(records,v){const a={reboots:0,gps:0,vlow:0,vhigh:0,faults:0,unplugged:0,minV:null,maxV:null,badVoltages:[],voltageTotal:0,reasons:[]};records.forEach(r=>{const n=dname(r),val=Number(r.data);if(isUnpluggedDiagnostic(r))a.unplugged++;if(has(n,['reboot','restart']))a.reboots++;if(has(n,['gps invalid','gps failure','no gps','gps']))a.gps++;if(has(n,['device fault','internal device','malfunction']))a.faults++;if(has(n,['external voltage','device voltage','battery voltage','voltage'])&&!isNaN(val)){a.voltageTotal++;a.minV=a.minV==null?val:Math.min(a.minV,val);a.maxV=a.maxV==null?val:Math.max(a.maxV,val);let bad=false;if(val<20){if(val<11){a.vlow++;bad=true}if(val>14.8){a.vhigh++;bad=true}}else{if(val<22){a.vlow++;bad=true}if(val>29){a.vhigh++;bad=true}}if(bad&&a.badVoltages.length<12)a.badVoltages.push(val)}});let p=0,ds=v.lastDate?Math.floor((Date.now()-new Date(v.lastDate).getTime())/DAY):999;p+=ds<1?30:ds<2?22:ds<4?12:ds<7?5:0;p+=a.reboots===0?20:a.reboots<=2?15:a.reboots<=5?10:a.reboots<=10?5:0;p+=a.gps===0?15:a.gps<=3?11:a.gps<=10?7:0;const vb=a.vlow+a.vhigh;p+=vb===0?20:vb<=5?15:vb<=20?9:0;p+=a.faults===0?15:a.faults<=2?10:a.faults<=6?5:0;if(a.unplugged>0){a.reasons.unshift('Possível remoção não autorizada');p=Math.min(p,25)}if(ds>=7){a.reasons.push('Sem dados válidos nos últimos 7 dias');p=Math.min(p,45)}if(a.reboots>2)a.reasons.push('Reboot excessivo: '+a.reboots);if(a.gps>0)a.reasons.push('Falha GPS: '+a.gps);if(vb>0)a.reasons.push('Tensão fora do padrão: '+vb+' leituras');if(a.faults>0)a.reasons.push('Falhas críticas do device: '+a.faults);a.score=Math.max(0,Math.round(p));a.dias=ds;return a}
function summary(list){const total=list.length||1,avg=Math.round(list.reduce((s,v)=>s+v.score,0)/total);return{total:list.length,avg,healthy:list.filter(v=>v.score>=80).length,attention:list.filter(v=>v.score>=60&&v.score<80).length,critical:list.filter(v=>v.score<60&&v.score>=40).length,risk:list.filter(v=>v.score<40).length,nodata:list.filter(v=>v.dias>=7).length,unplugged:list.filter(v=>v.unplugged>0).length,voltage:list.filter(v=>v.vlow+v.vhigh>0).length,gps:list.filter(v=>v.gps>0).length,reboot:list.filter(v=>v.reboots>2).length}}
function getDb(api,state){return(state&&(state.database||state.databaseName))||(api&&api.credentials&&api.credentials.database)||localStorage.getItem('fleetReportName')||'Rotagyn'}
function shell(){document.getElementById('app').innerHTML=`<div class="head"><div class="brand"><img class="logo" src="${LOGO_URL}"/><div><div class="title">Fleet Health Reports</div><div class="sub">RELATÓRIO PDF INTERNO • GEOTAB ADD-IN</div></div></div><div class="pill" id="statusBox">Conectando...</div></div><div class="bar"><button class="primary" id="loadBtn">Gerar análise</button><button class="soft" id="pdfBtn">Baixar PDF</button><button id="csvBtn">Exportar CSV</button><button id="demoBtn">Dados simulados</button><input id="reportName" placeholder="Nome do banco/base" value="${dbName}"><select id="scoreFilter"><option value="">Todos os veículos</option><option value="critical">Críticos + risco alto</option><option value="nodata">Sem dados 7d+</option><option value="voltage">Tensão fora</option></select></div><div class="info"><span>Base ativa: <b>30 dias</b></span><span>Score: <b>7 dias</b></span><span>Banco/Base: <b id="dbBox">${dbName}</b></span><span>Veículos no relatório: <b id="countBox">0</b></span></div><div id="alertBox" class="alert">Use dentro do MyGeotab para carregar dados reais. O PDF usa o nome do banco/base ou Rotagyn como fallback.</div><div id="kpis" class="grid"></div><div class="cols"><div class="panel"><div class="pt">Top problemas</div><div id="problems"></div></div><div class="panel"><div class="pt">Leitura executiva</div><div id="exec" class="exec"></div></div></div><div class="panel"><div class="pt">Ranking técnico da frota</div><div id="table" class="tablewrap"></div></div>`;$('loadBtn').onclick=()=>load(apiRef);$('pdfBtn').onclick=downloadPdf;$('csvBtn').onclick=exportCSV;$('demoBtn').onclick=demo;$('scoreFilter').onchange=apply;$('reportName').oninput=()=>{dbName=$('reportName').value||'Rotagyn';localStorage.setItem('fleetReportName',dbName);render()}}
function setStatus(t){const e=$('statusBox');if(e)e.textContent=t}
function alertMsg(t,cls){const e=$('alertBox');if(!e)return;e.className='alert '+(cls||'');e.innerHTML=t||''}
async function load(api){if(!api){alertMsg('Abra esta tela dentro do MyGeotab para carregar dados reais. Use Dados simulados para validar o PDF.','err');return}apiRef=api;dbName=getDb(api,stateRef);$('reportName').value=dbName;localStorage.setItem('fleetReportName',dbName);setStatus('Carregando...');alertMsg('Consultando Device, DeviceStatusInfo, StatusData e FaultData...');const from30=new Date(Date.now()-30*DAY),from7=new Date(Date.now()-7*DAY);try{const devs=await call(api,'Device',{isArchived:false});const dm={};devs.forEach(d=>{if(!d.name||d.isActive===false)return;if(d.toDate&&new Date(d.toDate)<new Date())return;dm[d.id]={nome:d.name,placa:d.licensePlate||d.name,grupos:(d.groups||[]).map(g=>g.id)}});const dsi=await call(api,'DeviceStatusInfo',{});const active={};dsi.forEach(s=>{const id=s.device&&s.device.id;if(!id||!dm[id]||!s.dateTime||new Date(s.dateTime)<from30||s.latitude==null||s.longitude==null)return;if(!active[id]||new Date(s.dateTime)>new Date(active[id].dateTime))active[id]=s});let st=[],faults=[];try{st=await call(api,'StatusData',{fromDate:from7.toISOString(),toDate:new Date().toISOString()})}catch(e){}try{faults=await call(api,'FaultData',{fromDate:from30.toISOString(),toDate:new Date().toISOString()})}catch(e){}const by={};st.concat(faults).forEach(r=>{const id=r.device&&r.device.id;if(id)(by[id]||(by[id]=[])).push(r)});vehicles=Object.keys(active).map(id=>{const s=active[id],i=dm[id],base={id,nome:i.nome,placa:i.placa,grupos:i.grupos,lastDate:s.dateTime,online:!!s.isDeviceCommunicating};return Object.assign(base,analyze(by[id]||[],base))}).sort((a,b)=>a.score-b.score);filtered=[...vehicles];setStatus(vehicles.length+' veículos');alertMsg('Análise concluída. PDF pronto para baixar.','ok');render()}catch(e){console.error(e);setStatus('Erro');alertMsg('Erro ao carregar dados: '+(e.message||e),'err')}}
function apply(){const f=$('scoreFilter').value;filtered=vehicles.filter(v=>f==='critical'?v.score<60:f==='nodata'?v.dias>=7:f==='voltage'?(v.vlow+v.vhigh)>0:true);render()}
function render(){if(!$('kpis'))return;dbName=$('reportName')&&$('reportName').value?$('reportName').value:'Rotagyn';const s=summary(filtered);$('dbBox').textContent=dbName;$('countBox').textContent=s.total.toLocaleString('pt-BR');$('kpis').innerHTML=[['Fleet Health Index',s.avg,'de 100','var(--blue)'],['Veículos analisados',s.total,'base filtrada','var(--txt)'],['Críticos',s.critical+s.risk,pct(s.critical+s.risk,s.total)+'% da frota','var(--red)'],['Sem dados 7d+',s.nodata,'prioridade operacional','var(--red)'],['Tensão fora',s.voltage,'qualidade elétrica','var(--orange)']].map(c=>`<div class="kpi"><span>${c[0]}</span><b style="color:${c[3]}">${c[1]}</b><small>${c[2]}</small></div>`).join('');const probs=[['Sem dados 7d+',s.nodata,'var(--red)'],['Tensão fora',s.voltage,'var(--orange)'],['Falha GPS',s.gps,'var(--yellow)'],['Reboot excessivo',s.reboot,'var(--blue)'],['Desconexão',s.unplugged,'var(--red)']];const max=Math.max(1,...probs.map(p=>p[1]));$('problems').innerHTML=probs.map(p=>`<div class="barrow"><b>${p[0]}</b><div class="track"><div class="fill" style="width:${Math.round(p[1]/max*100)}%;background:${p[2]}"></div></div><span>${p[1]}</span></div>`).join('');$('exec').innerHTML=`<div><b>Banco/Base:</b> ${dbName}</div><div><b>Leitura:</b> ${s.avg>=80?'frota saudável':s.avg>=60?'frota em atenção':'frota crítica'}.</div><div><b>Prioridade:</b> atuar primeiro em score abaixo de 60, sem dados 7d+, tensão fora e desconexão.</div>`;$('table').innerHTML='<table><thead><tr><th>#</th><th>Score</th><th>Placa</th><th>Veículo</th><th>Último dado</th><th>Problema principal</th><th>Status</th></tr></thead><tbody>'+filtered.slice(0,80).map((v,i)=>`<tr><td>${i+1}</td><td><b style="color:${scVar(v.score)}">${v.score}</b></td><td><b style="font-family:var(--mono);color:var(--txt)">${v.placa||'-'}</b></td><td class="vehicleCell" title="${v.nome}">${v.nome}</td><td>${v.dias>=7?'7d+':v.dias+'d'}</td><td>${mainProblem(v)}</td><td><span class="badge ${scClass(v.score)}">${scLabel(v.score)}</span></td></tr>`).join('')+'</tbody></table>'}
function demo(){dbName=$('reportName').value||'Rotagyn';vehicles=[['UDV2F12','UDV2F12 | CITROEN BASALT',25,0,0,0,0,0,0,1],['SRG8B64','BYD SEAL | SRG8B64 | TESTE GO9 4G',25,0,0,0,0,0,0,1],['SDJ0J48','SDJ0J48 | Fiat Cronos',25,11,0,0,0,0,0,1],['Painel rotagyn','Painel rotagyn',25,7,0,0,0,0,0,1],['Teste GO Focus','Teste GO Focus',45,11,0,0,0,0,0,0],['SDL1B41','SDL1B41 | VW Virtus | TESTE GO9 4G',45,28,0,0,0,0,0,0],['FOM4A84','FOM4A84 | Jeep Commander',75,0,0,0,1,0,0,0],['GAX3B67','AUDI - NSA',75,0,0,0,1,0,0,0],['DBB0001','DBB0001 TESTE',82,2,0,0,0,0,0,0],['TFR859','TFR859 | ROTAVERDE | TESTE GO9 4G',90,0,3,0,0,0,0,0],['TFP9I32','TFP9I32 | ROTAVERDE | TESTE GO9 4G',95,0,0,0,0,0,0,0]].map((r,i)=>({id:'d'+i,placa:r[0],nome:r[1],score:r[2],dias:r[3],reboots:r[4],gps:r[5],vlow:r[6],vhigh:r[7],faults:r[8],unplugged:r[9],voltageTotal:20,minV:11.4,maxV:14.2,badVoltages:[],reasons:[]}));filtered=[...vehicles];setStatus('Demo');alertMsg('Dados simulados carregados para prévia do PDF.','ok');render()}
function drawLogo(doc,x,y){doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(50,56,68);doc.text('ROTA',x,y);doc.setTextColor(17,153,220);doc.text('GYN',x+43,y);doc.setFontSize(5);doc.setTextColor(91,107,125);doc.text('Powered by GEOTAB',x+48,y+7)}
